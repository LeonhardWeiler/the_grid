<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>The Grid</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="cooldown">Select Pixel</div>
    <div id="coords">0 / 0</div>

    <div id="palette">
      <button
        class="color"
        data-color="#ff0000"
        style="background:#ff0000">
      </button>

      <button
        class="color"
        data-color="#00ff00"
        style="background:#00ff00">
      </button>

      <button
        class="color"
        data-color="#0000ff"
        style="background:#0000ff">
      </button>

      <button
        class="color"
        data-color="#ffff00"
        style="background:#ffff00">
      </button>

      <button
        class="color"
        data-color="#000000"
        style="background:#000000">
      </button>

      <button
        class="color"
        data-color="#ffffff"
        style="
          background:#ffffff;
          border-color:#888;
        ">
      </button>
    </div>

    <canvas id="canvas"></canvas>
    <canvas id="minimap"></canvas>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
