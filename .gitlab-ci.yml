stages:
  - build
  - docker


build:
  stage: build
  image: nixos/nix:latest
  script:
    - nix --extra-experimental-features "nix-command flakes" build
  artifacts:
    paths:
      - result/bin/the-grid
    expire_in: 1 week

docker-build:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind

  variables:
    DOCKER_TLS_CERTDIR: ""

  script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"

    - docker build -t weilerleonhard/the-grid:latest .
    - docker tag weilerleonhard/the-grid:latest weilerleonhard/the-grid:$CI_COMMIT_SHA

    - docker push weilerleonhard/the-grid:latest
    - docker push weilerleonhard/the-grid:$CI_COMMIT_SHA
